name: Deploy to Azure

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-broadcast-prod-eastus
  APP_SERVICE_NAME: broadcast-server
  ACR_NAME: broadcastacr
  IMAGE_NAME: broadcast-server
  SWA_NAME: broadcast-overlays
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Build y push imagen Docker a Azure Container Registry
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            -f apps/studio/Dockerfile \
            .

      - name: Push to ACR
        run: |
          docker push ${{ steps.meta.outputs.tag }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # ──────────────────────────────────────────────────────────────
  # Job 2: Deploy imagen al App Service
  # ──────────────────────────────────────────────────────────────
  deploy-app-service:
    name: Deploy App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update App Service container image
        run: |
          az webapp config container set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ needs.build-and-push.outputs.image-tag }} \
            --docker-registry-server-url https://${{ env.ACR_NAME }}.azurecr.io

      - name: Set App Service environment variables
        run: |
          az webapp config appsettings set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              NODE_ENV=production \
              PORT=8080 \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ALLOWED_ORIGIN="${{ secrets.ALLOWED_ORIGIN }}"

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Wait for App Service health check
        run: |
          echo "Esperando que el servidor responda..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/api/info || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App Service respondió correctamente (intento $i)"
              exit 0
            fi
            echo "⏳ Intento $i: status $STATUS — esperando 10s..."
            sleep 10
          done
          echo "❌ App Service no respondió en 2 minutos"
          exit 1

  # ──────────────────────────────────────────────────────────────
  # Job 3: Build y deploy SPA a Static Web App
  # Corre en paralelo con el deploy del App Service
  # ──────────────────────────────────────────────────────────────
  deploy-static-web-app:
    name: Deploy Static Web App (overlays)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm turbo build --filter @mineros/studio
        env:
          VITE_API_URL: https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/api
          VITE_WS_URL: wss://${{ env.APP_SERVICE_NAME }}.azurewebsites.net

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/studio/dist
          skip_app_build: true
