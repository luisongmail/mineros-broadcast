name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  TURBO_CONCURRENCY: "4"

jobs:
  ci:
    name: Validaciones base
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --concurrency=${TURBO_CONCURRENCY}

      - name: Lint
        run: pnpm turbo lint --concurrency=${TURBO_CONCURRENCY}

      - name: Build
        run: pnpm turbo build --concurrency=${TURBO_CONCURRENCY}

      - name: Tests
        run: pnpm turbo test --concurrency=${TURBO_CONCURRENCY}
