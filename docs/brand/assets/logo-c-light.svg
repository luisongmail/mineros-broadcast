<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');</style>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00C4E0"/>
      <stop offset="100%" stop-color="#00E096"/>
    </linearGradient>
  </defs>
  <rect width="480" height="120" fill="#F4F7FA" rx="14"/>
  <!-- Flow lines — fondo claro (isotipo más oscuro) -->
  <line x1="18" y1="84" x2="44" y2="84" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <line x1="26" y1="62" x2="68" y2="62" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <line x1="34" y1="40" x2="94" y2="40" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <text font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="46" letter-spacing="-1" x="114" y="75">
    <tspan fill="#0D1F3C">Play</tspan><tspan fill="#00A8C2">Flow</tspan>
  </text>
</svg>
